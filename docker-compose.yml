services:
  app:
    build: 
      context: .
      dockerfile: ./docker/dev.Dockerfile
    container_name: akocloud_app
    volumes:
      - ./:/var/www/html
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      # Docker socket: allows the queue worker to spawn Terraform containers
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  queue:
    build:
      context: .
      dockerfile: ./docker/dev.Dockerfile
    container_name: akocloud_queue
    command: php artisan queue:work --queue=default --tries=1 --timeout=3600 --sleep=3
    volumes:
      - ./:/var/www/html
      # Docker socket: Terraform containers are spawned by the worker
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # AWS credentials (passed to Terraform workspaces)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      # GCP credentials
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      # Terraform Docker image to use
      TF_DOCKER_IMAGE: ${TF_DOCKER_IMAGE:-hashicorp/terraform:1.9}
    depends_on:
      - db
      - app

  db:
    image: postgres:latest
    container_name: akocloud_db
    environment:
      POSTGRES_DB: akocloud
      POSTGRES_USER: akocloud
      POSTGRES_PASSWORD: akocloud
    ports:
      - "5432:5432"
    volumes:
      - akocloud_db_data:/var/lib/postgresql

volumes:
  akocloud_db_data: