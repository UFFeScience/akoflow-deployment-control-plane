services:
  app:
    build: 
      context: .
      dockerfile: ./docker/dev.Dockerfile
    container_name: akocloud_app
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./:/var/www/html
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      # Docker socket: allows the queue worker and health-check loop to talk to Docker
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
  worker:
    build:
      context: .
      dockerfile: ./docker/dev.Dockerfile
    container_name: akocloud_worker
    command: ["php", "artisan", "queue:work", "--timeout=3600"]
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  healthcheck-loop:
    build:
      context: .
      dockerfile: ./docker/dev.Dockerfile
    container_name: akocloud_healthcheck_loop
    command: ["php", "artisan", "provider:health-check-loop", "--interval=60"]
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  db:
    image: postgres:latest
    container_name: akocloud_db
    environment:
      POSTGRES_DB: akocloud
      POSTGRES_USER: akocloud
      POSTGRES_PASSWORD: akocloud
    ports:
      - "5432:5432"
    volumes:
      - akocloud_db_data:/var/lib/postgresql

volumes:
  akocloud_db_data: